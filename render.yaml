services:
  - type: web
    name: academia-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: academia
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: GEMINI_FAST_MODEL
        value: gemini-2.5-flash-lite
      - key: TTS_VOICE_ID
        value: pNInz6obpgDQGcFmaJgB
      - key: ALLOWED_ORIGINS
        sync: false