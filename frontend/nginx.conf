server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Cache assets with fingerprint
    location /assets {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # Serve static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Route all other requests to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Don't log requests to favicon or robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
